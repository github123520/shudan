<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>书单情报台</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --panel: #fff;
        --line: #d0d7de;
        --head: #f6f8fa;
        --text: #24292f;
        --muted: #57606a;
        --blue: #329afe;
        --red: #d32f2f;
        --green: #44bb73;
        --dark: #555;
        --ink: #2f3b4a;
        --soft-green: #edf8f1;
        --soft-red: #fff1f1;
        --soft-warn: #fff3df;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      * { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        font-size: 11px;
        line-height: 1.7;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app-shell {
        width: min(1280px, calc(100vw - 20px));
        margin: 10px auto 28px;
      }

      .about-panel,
      .about-section {
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .about-panel {
        box-shadow: var(--shadow);
      }

      .about-panel-head,
      .about-section-head {
        border-bottom: 1px solid var(--line);
        background: var(--head);
        padding: 6px 10px;
        font-size: 11px;
        font-weight: bold;
        text-align: left;
      }

      .about-panel-body {
        padding: 10px;
        display: grid;
        gap: 10px;
      }

      .about-section-body {
        padding: 8px;
        display: grid;
        gap: 8px;
      }

      .about-line { line-height: 1.7; }

      .about-pill,
      .about-path {
        display: inline-block;
        min-height: 14px;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 11px;
        line-height: 12px;
        color: #fff;
        vertical-align: baseline;
      }

      .about-pill.blue { background: var(--blue); }
      .about-pill.red { background: var(--red); }
      .about-pill.green { background: var(--green); }
      .about-pill.dark { background: var(--dark); }

      .about-path {
        background: var(--ink);
        word-break: break-all;
      }

      .about-gap-before { margin-left: 2px; }
      .about-gap-after { margin-right: 2px; }

      .topbar {
        display: grid;
        gap: 6px;
        grid-template-columns: minmax(160px, 1fr) 112px auto auto auto;
        align-items: stretch;
      }

      .field-input,
      .field-textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        padding: 8px 10px;
        outline: none;
        min-height: 34px;
      }

      .field-textarea {
        min-height: 76px;
        resize: vertical;
      }

      .field-input:focus,
      .field-textarea:focus {
        border-color: var(--blue);
        box-shadow: inset 0 0 0 1px var(--blue);
      }

      .btn {
        border: none;
        border-radius: 4px;
        padding: 2px 10px;
        min-height: 34px;
        font-size: 11px;
        cursor: pointer;
        background: var(--dark);
        color: #fff;
        white-space: nowrap;
      }

      .btn:hover { background: var(--blue); }
      .btn.secondary { background: var(--ink); }
      .btn.blue { background: var(--blue); }
      .btn.green { background: var(--green); }
      .btn.red { background: var(--red); }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .workspace {
        display: grid;
        gap: 10px;
        grid-template-columns: 380px minmax(0, 1fr);
        align-items: start;
      }

      .left-stack,
      .right-stack {
        display: grid;
        gap: 10px;
      }

      .compare-box {
        display: grid;
        gap: 8px;
      }

      .drop-slot {
        min-height: 88px;
        border: 1px dashed #9aa4b2;
        background: #fbfcfd;
        padding: 8px;
        display: grid;
        gap: 6px;
        align-content: center;
      }

      .drop-slot.over {
        border-color: var(--blue);
        background: #f0f7ff;
      }

      .drop-slot.filled {
        border-style: solid;
        border-color: #9bd4ae;
        background: var(--soft-green);
      }

      .library-list,
      .job-list,
      .result-list {
        display: grid;
        gap: 8px;
      }

      .library-list {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      }

      .library-card,
      .job-card,
      .result-card {
        background: #fff;
        box-shadow: inset 0 0 0 1px var(--line);
        padding: 8px;
        display: grid;
        gap: 7px;
      }

      .library-card {
        cursor: grab;
      }

      .library-card:active {
        cursor: grabbing;
      }

      .card-head {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        align-items: center;
      }

      .card-title {
        font-size: 12px;
        font-weight: 700;
        line-height: 1.5;
        word-break: break-word;
      }

      .muted {
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .status-line {
        padding: 8px;
        background: var(--soft-warn);
        box-shadow: inset 0 0 0 1px #f0c87b;
      }

      .status-line.good {
        background: var(--soft-green);
        box-shadow: inset 0 0 0 1px #9bd4ae;
      }

      .status-line.bad {
        background: var(--soft-red);
        box-shadow: inset 0 0 0 1px #efaaaa;
      }

      .progress-track {
        width: 100%;
        height: 12px;
        overflow: hidden;
        background: #fff;
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: var(--green);
        transition: width 0.25s ease;
      }

      .progress-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        color: var(--muted);
      }

      .empty-panel {
        min-height: 126px;
        display: grid;
        place-items: center;
        color: var(--muted);
        background: #fbfcfd;
        box-shadow: inset 0 0 0 1px var(--line);
        text-align: center;
        padding: 20px;
      }

      .batch-row {
        display: grid;
        gap: 6px;
        grid-template-columns: minmax(0, 1fr) 100px auto;
      }

      .output-head {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        justify-content: space-between;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        width: min(360px, calc(100vw - 36px));
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        padding: 10px;
        z-index: 1000;
        display: none;
      }

      .toast.open {
        display: grid;
        gap: 6px;
      }

      @media (max-width: 900px) {
        .topbar,
        .workspace,
        .batch-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="about-panel">
        <div class="about-panel-head">
          书单情报台
          <span id="storage-badge" class="about-pill dark about-gap-before">检查中</span>
        </div>
        <div class="about-panel-body">
          <section class="about-section">
            <div class="about-section-head">
              <span class="about-pill blue about-gap-after">抓取</span>搜到后自动取综合最高的小说
            </div>
            <div class="about-section-body">
              <div class="topbar">
                <input id="search-query" class="field-input" value="我真没想重生啊" autocomplete="off" />
                <input id="single-max-pages" class="field-input" value="2" placeholder="页数" />
                <button id="single-crawl-btn" class="btn green" type="button">搜书并抓取</button>
                <button id="library-refresh-btn" class="btn secondary" type="button">刷新本地书单</button>
                <button id="clear-compare-btn" class="btn secondary" type="button">清空对比</button>
              </div>
              <div id="top-status" class="status-line">就绪。</div>
            </div>
          </section>

          <div class="workspace">
            <div class="left-stack">
              <section class="about-section">
                <div class="about-section-head">
                  <span class="about-pill green about-gap-after">本地书单</span>拖到下面两个槽里
                </div>
                <div class="about-section-body">
                  <div id="library-list" class="library-list">
                    <div class="empty-panel">正在读取本地书单。</div>
                  </div>
                </div>
              </section>

              <section class="about-section">
                <div class="about-section-head">
                  <span class="about-pill blue about-gap-after">对比框</span>放入两本小说
                </div>
                <div class="about-section-body compare-box">
                  <div id="slot-0" class="drop-slot" data-slot="0">拖入第 1 本本地书单</div>
                  <div id="slot-1" class="drop-slot" data-slot="1">拖入第 2 本本地书单</div>
                  <button id="compare-btn" class="btn blue" type="button" disabled>列出重合书单</button>
                </div>
              </section>

              <section class="about-section">
                <div class="about-section-head">
                  <span class="about-pill red about-gap-after">批量</span>多本分别抓取
                </div>
                <div class="about-section-body">
                  <div class="batch-row">
                    <textarea id="batch-queries" class="field-textarea" placeholder="每行一本，或用逗号分隔"></textarea>
                    <input id="batch-max-pages" class="field-input" value="2" placeholder="页数" />
                    <button id="batch-crawl-btn" class="btn green" type="button">批量抓取</button>
                  </div>
                </div>
              </section>

              <section class="about-section">
                <div class="about-section-head">
                  <span class="about-pill red about-gap-after">任务</span>独立进度
                </div>
                <div class="about-section-body">
                  <div id="job-list" class="job-list">
                    <div class="empty-panel">暂无任务。</div>
                  </div>
                </div>
              </section>
            </div>

            <div class="right-stack">
              <section class="about-section">
                <div class="about-section-head">
                  <span class="about-pill blue about-gap-after">重合书单</span>右侧结果
                </div>
                <div class="about-section-body">
                  <div id="output-status" class="status-line">把两本本地书单拖到左侧对比框。</div>
                  <div id="output-list" class="result-list">
                    <div class="empty-panel">等待对比。</div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const state = {
        books: [],
        compare: [null, null],
        details: { bookId: "", entries: [], page: 0, total: 0, book: null },
        jobTimers: new Map(),
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function splitParagraphs(text) {
        return String(text || "")
          .replaceAll("\\r\\n", "\n")
          .replaceAll("\\n", "\n")
          .replaceAll("\\r", "\n")
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function formatTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function humanError(error) {
        const raw = error instanceof Error ? error.message : String(error);
        try {
          const parsed = JSON.parse(raw);
          return parsed.error || parsed.message || raw;
        } catch {
          return raw;
        }
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data;
        try { data = text ? JSON.parse(text) : {}; } catch { data = { message: text }; }
        if (!response.ok) throw new Error(JSON.stringify(data));
        return data;
      }

      function setStatus(id, message, tone = "") {
        const el = document.getElementById(id);
        el.className = tone ? `status-line ${tone}` : "status-line";
        el.textContent = message;
      }

      function setButtonBusy(button, busy, label) {
        if (busy) {
          button.dataset.originalText = button.textContent;
          button.textContent = label;
          button.disabled = true;
          return;
        }
        button.textContent = button.dataset.originalText || button.textContent;
        button.disabled = false;
      }

      function showToast(title, body) {
        const toast = document.getElementById("toast");
        toast.className = "toast open";
        toast.innerHTML = `
          <div class="about-line"><span class="about-pill green about-gap-after">${escapeHtml(title)}</span>${escapeHtml(body)}</div>
        `;
        window.setTimeout(() => {
          toast.className = "toast";
          toast.innerHTML = "";
        }, 3200);
      }

      function parseCnMetric(value) {
        const text = String(value || "").replaceAll(",", "").replaceAll("，", "").trim();
        const match = text.match(/[\d.]+/);
        if (!match) return 0;
        let number = Number(match[0]);
        if (!Number.isFinite(number)) return 0;
        if (text.includes("亿")) number *= 100000000;
        if (text.includes("万")) number *= 10000;
        if (text.includes("千")) number *= 1000;
        return number;
      }

      function rankBooks(items) {
        const rows = items.map((book) => ({
          book,
          word: parseCnMetric(book.wordCountText),
          favorite: parseCnMetric(book.favoriteCountText),
          recommendation: parseCnMetric(book.recommendationCountText),
        }));
        const maxWord = Math.max(...rows.map((item) => item.word), 1);
        const maxFavorite = Math.max(...rows.map((item) => item.favorite), 1);
        const maxRecommendation = Math.max(...rows.map((item) => item.recommendation), 1);

        return rows
          .map((item) => ({
            ...item.book,
            autoScore:
              (item.favorite / maxFavorite) * 4 +
              (item.recommendation / maxRecommendation) * 3 +
              (item.word / maxWord) * 2,
          }))
          .sort((a, b) => b.autoScore - a.autoScore);
      }

      function splitBookQueries(value) {
        return String(value || "")
          .split(/[\n,，、;；]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function progressHtml(progress) {
        const target = Number(progress?.targetPages || 0);
        const current = Math.min(Number(progress?.currentPage || 0), target || Number.MAX_SAFE_INTEGER);
        const percent = target ? Math.max(0, Math.min(100, Math.round((current / target) * 100))) : 0;
        const total = Number(progress?.sourceTotalPages || 0);
        const entries = Number(progress?.crawledEntries || 0);

        return `
          <div class="progress-track">
            <div class="progress-fill" style="width: ${percent}%"></div>
          </div>
          <div class="progress-stats">
            <span class="about-path">${target ? `${current} / ${target} 页` : "读取页数"}</span>
            <span>${percent}%</span>
            ${total && total !== target ? `<span>全量 ${escapeHtml(total)} 页</span>` : ""}
            ${entries ? `<span>${escapeHtml(entries)} 条</span>` : ""}
          </div>
        `;
      }

      function jobStatusView(job) {
        const map = {
          queued: ["排队", "blue"],
          running: ["抓取", "red"],
          completed: ["完成", "green"],
          failed: ["失败", "red"],
        };
        const [label, color] = map[job.status] || [job.status, "dark"];
        return { label, color };
      }

      async function refreshHealth() {
        const data = await requestJson("/health");
        const driver = data.driver || (data.databaseConfigured ? "postgres" : "file");
        const badge = document.getElementById("storage-badge");
        badge.className = "about-pill green about-gap-before";
        badge.textContent = driver === "postgres" ? "PostgreSQL" : "文件存储";
      }

      async function refreshLibrary() {
        const data = await requestJson("/books");
        state.books = data.books || [];
        renderLibrary();
        setStatus("top-status", `本地 ${state.books.length} 本书单。`, state.books.length ? "good" : "");
      }

      function findBook(bookId) {
        return state.books.find((book) => String(book.id) === String(bookId)) || null;
      }

      function renderLibrary() {
        const root = document.getElementById("library-list");
        root.innerHTML = "";

        if (!state.books.length) {
          root.innerHTML = '<div class="empty-panel">没有本地书单。</div>';
          renderCompareSlots();
          return;
        }

        for (const book of state.books) {
          const card = document.createElement("article");
          card.className = "library-card";
          card.draggable = true;
          card.dataset.bookId = book.id;
          card.innerHTML = `
            <div class="card-head">
              <span class="about-pill green">本地</span>
              <span class="about-path">${escapeHtml(book.entryCount || 0)} 条</span>
            </div>
            <div class="card-title">${escapeHtml(book.title || book.id)}</div>
            <div class="muted">
              ID ${escapeHtml(book.id)}<br>
              ${escapeHtml(book.crawledPages || "?")} / ${escapeHtml(book.sourceTotalPages || "?")} 页<br>
              ${escapeHtml(formatTime(book.fetchedAt) || "未知时间")}
            </div>
            <div class="actions">
              <button class="btn blue" type="button" data-add-id="${escapeHtml(book.id)}">加入</button>
              <button class="btn secondary" type="button" data-view-id="${escapeHtml(book.id)}">查看</button>
              <button class="btn secondary" type="button" data-check-id="${escapeHtml(book.id)}">更新</button>
            </div>
          `;
          card.addEventListener("dragstart", (event) => {
            event.dataTransfer.setData("text/plain", String(book.id));
          });
          root.appendChild(card);
        }

        root.querySelectorAll("[data-add-id]").forEach((button) => {
          button.addEventListener("click", () => addBookToCompare(button.dataset.addId));
        });
        root.querySelectorAll("[data-view-id]").forEach((button) => {
          button.addEventListener("click", () => loadLocalBook(button.dataset.viewId));
        });
        root.querySelectorAll("[data-check-id]").forEach((button) => {
          button.addEventListener("click", () => checkUpdate(button.dataset.checkId));
        });

        renderCompareSlots();
      }

      function renderCompareSlots() {
        state.compare.forEach((book, index) => {
          const slot = document.getElementById(`slot-${index}`);
          slot.className = `drop-slot${book ? " filled" : ""}`;
          slot.innerHTML = book
            ? `
              <div class="card-head">
                <span class="about-pill blue">#${index + 1}</span>
                <span class="about-path">${escapeHtml(book.entryCount || 0)} 条</span>
              </div>
              <div class="card-title">${escapeHtml(book.title || book.id)}</div>
              <div class="actions">
                <button class="btn secondary" type="button" data-remove-slot="${index}">移出</button>
                <button class="btn secondary" type="button" data-view-id="${escapeHtml(book.id)}">查看</button>
              </div>
            `
            : `拖入第 ${index + 1} 本本地书单`;
        });

        document.querySelectorAll("[data-remove-slot]").forEach((button) => {
          button.addEventListener("click", () => {
            state.compare[Number(button.dataset.removeSlot)] = null;
            renderCompareSlots();
            renderEmptyOutput();
          });
        });
        document.querySelectorAll(".drop-slot [data-view-id]").forEach((button) => {
          button.addEventListener("click", () => loadLocalBook(button.dataset.viewId));
        });

        const ready = state.compare.filter(Boolean).length === 2;
        document.getElementById("compare-btn").disabled = !ready;
        if (ready) void runCompare();
      }

      function addBookToCompare(bookId) {
        const book = findBook(bookId);
        if (!book) return;
        if (state.compare.some((item) => item && String(item.id) === String(book.id))) return;

        const emptyIndex = state.compare.findIndex((item) => !item);
        state.compare[emptyIndex === -1 ? 1 : emptyIndex] = book;
        renderCompareSlots();
      }

      function setupDropSlots() {
        document.querySelectorAll(".drop-slot").forEach((slot) => {
          slot.addEventListener("dragover", (event) => {
            event.preventDefault();
            slot.classList.add("over");
          });
          slot.addEventListener("dragleave", () => slot.classList.remove("over"));
          slot.addEventListener("drop", (event) => {
            event.preventDefault();
            slot.classList.remove("over");
            const bookId = event.dataTransfer.getData("text/plain");
            const book = findBook(bookId);
            if (!book) return;

            const index = Number(slot.dataset.slot);
            const otherIndex = index === 0 ? 1 : 0;
            if (state.compare[otherIndex] && String(state.compare[otherIndex].id) === String(book.id)) return;
            state.compare[index] = book;
            renderCompareSlots();
          });
        });
      }

      function renderEmptyOutput() {
        setStatus("output-status", "把两本本地书单拖到左侧对比框。");
        document.getElementById("output-list").innerHTML = '<div class="empty-panel">等待对比。</div>';
      }

      async function runCompare() {
        const books = state.compare.filter(Boolean);
        if (books.length !== 2) return;

        setStatus("output-status", `正在对比《${books[0].title}》和《${books[1].title}》...`);
        const data = await requestJson("/search/booklists/intersection", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ bookIds: books.map((book) => String(book.id)), limit: 100 }),
        });
        renderIntersection(data.results || [], books);
      }

      function renderIntersection(rows, books) {
        const root = document.getElementById("output-list");
        root.innerHTML = "";
        setStatus("output-status", `《${books[0].title}》 与 《${books[1].title}》重合 ${rows.length} 个书单。`, rows.length ? "good" : "");

        if (!rows.length) {
          root.innerHTML = '<div class="empty-panel">没有重合书单。</div>';
          return;
        }

        for (const [index, row] of rows.entries()) {
          const card = document.createElement("article");
          card.className = "result-card";
          card.innerHTML = `
            <div class="card-head">
              <span class="about-pill blue">#${index + 1}</span>
              <span class="about-path">${escapeHtml(row.booklistTitle || "未知书单")}</span>
              ${row.booklistFollowerCount !== null && row.booklistFollowerCount !== undefined ? `<span class="about-pill green">${escapeHtml(row.booklistFollowerCount)} 关注</span>` : ""}
              ${row.booklistBookCount !== null && row.booklistBookCount !== undefined ? `<span class="about-pill dark">${escapeHtml(row.booklistBookCount)} 本书</span>` : ""}
            </div>
            <div class="actions">
              ${row.booklistUrl ? `<button class="btn secondary" type="button" data-open-url="${escapeHtml(row.booklistUrl)}">打开书单</button>` : ""}
            </div>
          `;
          root.appendChild(card);
        }

        root.querySelectorAll("[data-open-url]").forEach((button) => {
          button.addEventListener("click", () => window.open(button.dataset.openUrl, "_blank"));
        });
      }

      async function loadLocalBook(bookId, page = 1, append = false) {
        const data = await requestJson(`/books/${bookId}?page=${page}`);
        const entries = data.entries || [];
        const pagination = data.pagination || {};

        if (!append || state.details.bookId !== bookId) {
          state.details = {
            bookId,
            book: data.book,
            entries: [],
            page: 0,
            total: pagination.total || entries.length,
          };
        }
        state.details.entries.push(...entries);
        state.details.page = pagination.page || page;
        state.details.total = pagination.total || state.details.entries.length;
        renderLocalBookOutput();
      }

      function renderLocalBookOutput() {
        const root = document.getElementById("output-list");
        const { book, entries, page, total, bookId } = state.details;
        root.innerHTML = "";
        setStatus("output-status", `本地书单：${book?.title || bookId}，已显示 ${entries.length} / ${total} 条。`, "good");

        for (const [index, entry] of entries.entries()) {
          const paragraphs = splitParagraphs(entry.commentText);
          const card = document.createElement("article");
          card.className = "result-card";
          card.innerHTML = `
            <div class="card-head">
              <span class="about-pill blue">#${index + 1}</span>
              <span class="about-path">${escapeHtml(entry.booklistTitle || "未知书单")}</span>
              ${entry.booklistFollowerCount !== null && entry.booklistFollowerCount !== undefined ? `<span class="about-pill green">${escapeHtml(entry.booklistFollowerCount)} 关注</span>` : ""}
            </div>
            <div>${paragraphs.length ? paragraphs.map((line) => `<p>${escapeHtml(line)}</p>`).join("") : '<span class="muted">无评语正文</span>'}</div>
            <div class="actions">
              ${entry.booklistUrl ? `<button class="btn secondary" type="button" data-open-url="${escapeHtml(entry.booklistUrl)}">打开书单</button>` : ""}
            </div>
          `;
          root.appendChild(card);
        }

        if (entries.length < total) {
          const more = document.createElement("article");
          more.className = "result-card";
          more.innerHTML = `<button id="load-more-local" class="btn blue" type="button">加载下一页</button>`;
          root.appendChild(more);
          document.getElementById("load-more-local").addEventListener("click", () => loadLocalBook(bookId, page + 1, true));
        }

        root.querySelectorAll("[data-open-url]").forEach((button) => {
          button.addEventListener("click", () => window.open(button.dataset.openUrl, "_blank"));
        });
      }

      async function searchBestBook(query) {
        const data = await requestJson(`/search/books?q=${encodeURIComponent(query)}`);
        const book = data.best || rankBooks(data.results || [])[0];
        if (!book) throw new Error(`没有找到《${query}》`);
        return book;
      }

      async function createCrawlJob(bookId, maxPagesRaw) {
        const payload = { bookId: String(bookId) };
        if (String(maxPagesRaw || "").trim()) payload.maxPages = Number(maxPagesRaw);
        return requestJson("/jobs/crawl-book", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      }

      function renderJobCard(job, book) {
        const root = document.getElementById("job-list");
        const empty = root.querySelector(".empty-panel");
        if (empty) empty.remove();

        let card = document.getElementById(`job-${job.id}`);
        if (!card) {
          card = document.createElement("article");
          card.id = `job-${job.id}`;
          card.className = "job-card";
          root.prepend(card);
        }

        const { label, color } = jobStatusView(job);
        card.innerHTML = `
          <div class="card-head">
            <span class="about-pill ${color}">${escapeHtml(label)}</span>
            <span class="about-path">${escapeHtml(book.title || job.target_id)}</span>
            <span class="about-pill dark">#${escapeHtml(job.id)}</span>
          </div>
          ${progressHtml(job.payload?.progress)}
          <div class="actions">
            <button class="btn secondary" type="button" data-view-id="${escapeHtml(job.target_id)}">查看本地</button>
          </div>
        `;
        card.querySelector("[data-view-id]").addEventListener("click", () => loadLocalBook(job.target_id));
      }

      function stopJobPolling(jobId) {
        const timer = state.jobTimers.get(jobId);
        if (timer) clearInterval(timer);
        state.jobTimers.delete(jobId);
      }

      function startJobPolling(jobId, book) {
        stopJobPolling(jobId);

        const poll = async () => {
          try {
            const job = await requestJson(`/jobs/${jobId}`);
            renderJobCard(job, book);

            if (job.status === "completed") {
              stopJobPolling(jobId);
              await refreshLibrary().catch(() => undefined);
              showToast("已保存", `《${book.title || job.target_id}》进入本地书单`);
            }

            if (job.status === "failed") {
              stopJobPolling(jobId);
              showToast("抓取失败", job.error_message || "任务没有完成");
            }
          } catch (error) {
            stopJobPolling(jobId);
            showToast("任务异常", humanError(error));
          }
        };

        void poll();
        state.jobTimers.set(jobId, setInterval(poll, 3000));
      }

      async function searchAndCrawl(query, maxPagesRaw) {
        const book = await searchBestBook(query);
        const job = await createCrawlJob(book.bookId, maxPagesRaw);
        startJobPolling(job.jobId, book);
        return book;
      }

      async function checkUpdate(bookId) {
        const book = findBook(bookId);
        if (!book) return;
        setStatus("top-status", `检查《${book.title}》更新...`);

        const data = await requestJson(`/books/${bookId}/update-check`);
        if (!data.hasUpdate) {
          setStatus("top-status", `《${book.title}》已是最新。`, "good");
          return;
        }

        const pages = data.suggestedRefreshPages || "";
        setStatus("top-status", `《${book.title}》可补充，建议抓到 ${pages || "全量"} 页。`, "");
        const confirmed = window.confirm(`《${book.title}》有可补充书单，是否现在补抓？`);
        if (!confirmed) return;

        const job = await createCrawlJob(bookId, pages ? String(pages) : "");
        startJobPolling(job.jobId, { bookId, title: book.title });
      }

      document.getElementById("single-crawl-btn").addEventListener("click", async () => {
        const button = document.getElementById("single-crawl-btn");
        const query = document.getElementById("search-query").value.trim();
        const maxPages = document.getElementById("single-max-pages").value.trim();
        if (query.length < 2) {
          setStatus("top-status", "至少输入 2 个字。", "bad");
          return;
        }

        setButtonBusy(button, true, "创建中...");
        try {
          const book = await searchAndCrawl(query, maxPages);
          setStatus("top-status", `已自动选择《${book.title}》并创建抓取任务。`, "good");
        } catch (error) {
          setStatus("top-status", humanError(error), "bad");
        } finally {
          setButtonBusy(button, false);
        }
      });

      document.getElementById("search-query").addEventListener("keydown", (event) => {
        if (event.key === "Enter") document.getElementById("single-crawl-btn").click();
      });

      document.getElementById("batch-crawl-btn").addEventListener("click", async () => {
        const button = document.getElementById("batch-crawl-btn");
        const queries = splitBookQueries(document.getElementById("batch-queries").value);
        const maxPages = document.getElementById("batch-max-pages").value.trim();
        if (!queries.length) {
          setStatus("top-status", "批量名单为空。", "bad");
          return;
        }

        setButtonBusy(button, true, "创建中...");
        try {
          for (const query of queries) {
            await searchAndCrawl(query, maxPages);
          }
          setStatus("top-status", `已创建 ${queries.length} 个抓取任务。`, "good");
        } catch (error) {
          setStatus("top-status", humanError(error), "bad");
        } finally {
          setButtonBusy(button, false);
        }
      });

      document.getElementById("library-refresh-btn").addEventListener("click", async () => {
        const button = document.getElementById("library-refresh-btn");
        setButtonBusy(button, true, "刷新中...");
        try {
          await refreshLibrary();
        } catch (error) {
          setStatus("top-status", humanError(error), "bad");
        } finally {
          setButtonBusy(button, false);
        }
      });

      document.getElementById("clear-compare-btn").addEventListener("click", () => {
        state.compare = [null, null];
        renderCompareSlots();
        renderEmptyOutput();
      });

      document.getElementById("compare-btn").addEventListener("click", () => {
        void runCompare().catch((error) => setStatus("output-status", humanError(error), "bad"));
      });

      setupDropSlots();
      renderCompareSlots();
      refreshHealth().catch(() => undefined);
      refreshLibrary().catch((error) => setStatus("top-status", humanError(error), "bad"));
    </script>
  </body>
</html>
